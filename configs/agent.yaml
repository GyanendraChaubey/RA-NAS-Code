llm:
  provider: groq
  model: llama-3.3-70b-versatile
  base_url: https://api.groq.com/openai/v1
  temperature: 1.2
  temperature_min: 0.7
  temperature_decay: 0.05
  max_tokens: 1536
  api_key_env: GROQ_API_KEY

agent:
  max_iterations: 20
  top_k_memory: 5
  retry_on_invalid: 3
  feedback_strategy: top_k
  mock_mode: true
  explore_every: 2
  diversity_penalty: true

