dataset:
  name: cifar10
  data_dir: ./data
  num_classes: 10
  val_split: 0.1

training:
  epochs: 50
  batch_size: 256
  learning_rate: 0.1
  momentum: 0.9
  weight_decay: 1e-3
  optimizer: sgd
  scheduler: cosine_warmup
  warmup_epochs: 10
  screening_epochs: 10
  label_smoothing: 0.1
  num_workers: 2
  seed: 42
  augmentation:
    cutout: true
    cutout_length: 8
    mixup: true
    mixup_alpha: 0.4
    randaugment: true
  swa:
    enabled: true
    start_frac: 0.75
    lr: 0.05

early_stopping:
  enabled: true
  patience: 30
  monitor: val_accuracy
  mode: max

experiment:
  name: exp_001
  output_dir: ./experiments
  save_best_only: true

architecture_constraints:
  min_layers: 2
  max_layers: 8
  min_filters: 64
  max_filters: 512
  allowed_activations: [relu, gelu, silu]
  allowed_kernels: [3, 5]
