dataset:
  name: cifar10
  data_dir: ./data
  num_classes: 10
  val_split: 0.1

training:
  epochs: 20
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 1e-4
  scheduler: cosine
  num_workers: 0
  seed: 42

early_stopping:
  enabled: true
  patience: 5
  monitor: val_accuracy
  mode: max

experiment:
  name: exp_001
  output_dir: ./experiments
  save_best_only: true

architecture_constraints:
  min_layers: 2
  max_layers: 6
  min_filters: 16
  max_filters: 256
  allowed_activations: [relu, gelu, silu]
  allowed_kernels: [3, 5]
