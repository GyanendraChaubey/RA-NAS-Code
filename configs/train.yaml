dataset:
  name: cifar10
  data_dir: ./data
  num_classes: 10
  val_split: 0.1

training:
  epochs: 50
  batch_size: 256
  learning_rate: 0.1
  momentum: 0.9
  weight_decay: 5e-4
  optimizer: sgd
  scheduler: cosine_warmup
  warmup_epochs: 5
  screening_epochs: 5
  num_workers: 2
  seed: 42
  augmentation:
    cutout: true
    cutout_length: 16
    mixup: true
    mixup_alpha: 0.2

early_stopping:
  enabled: true
  patience: 10
  monitor: val_accuracy
  mode: max

experiment:
  name: exp_001
  output_dir: ./experiments
  save_best_only: true

architecture_constraints:
  min_layers: 2
  max_layers: 8
  min_filters: 16
  max_filters: 512
  allowed_activations: [relu, gelu, silu]
  allowed_kernels: [3, 5, 7]
